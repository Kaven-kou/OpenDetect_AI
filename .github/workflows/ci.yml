name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: Lint
        run: uv run python -m ruff check src tests api.py
      - name: Unit tests
        run: uv run python -m pytest tests/unit_tests -q
